<!-- Master Checkbox with Indeterminate State 

Goal: Implement a “Select All” with proper indeterminate behavior. 
Constraints: Indeterminate is visual only; compute from child selection. 
Steps: 

A master checkbox above a list of items with their own checkboxes. 

Click master selects/deselects all. 

When some (not all) are selected, master becomes indeterminate. 
Success: Master state always reflects children accurately.  -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Master Checkbox with Indeterminate State</title>

<style>
    body {
        font-family: Arial, sans-serif;
        padding: 20px;
        background: linear-gradient(135deg, #2E3192, #1BFFFF);
        color: #fff;
        display: flex;
        justify-content: center;
    }

    .container {
        background: rgba(255,255,255,0.15);
        backdrop-filter: blur(14px);
        padding: 25px;
        border-radius: 14px;
        width: 100%;
        max-width: 420px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    }

    h2 {
        text-align: center;
        margin-bottom: 20px;
        text-shadow: 0 0 6px rgba(0,0,0,0.4);
        letter-spacing: 1px;
    }

    label {
        display: flex;
        align-items: center;
        gap: 10px;
        background: rgba(255,255,255,0.12);
        padding: 12px;
        margin: 8px 0;
        border-radius: 8px;
        cursor: pointer;
        transition: 0.3s;
    }

    label:hover {
        background: rgba(255,255,255,0.25);
    }

    input[type="checkbox"] {
        width: 18px;
        height: 18px;
        cursor: pointer;
        accent-color: #1BFFFF; /* Cyan accent */
    }
</style>
</head>

<body>
<div class="container">
    <h2>Select Items</h2>

    <!-- Master Checkbox -->
    <label>
        <input type="checkbox" id="master">
        <strong>Select All</strong>
    </label>

    <!-- Child Checkboxes -->
    <label><input type="checkbox" class="child"> Item 1</label>
    <label><input type="checkbox" class="child"> Item 2</label>
    <label><input type="checkbox" class="child"> Item 3</label>
    <label><input type="checkbox" class="child"> Item 4</label>
    <label><input type="checkbox" class="child"> Item 5</label>
</div>

<script>
    const master = document.getElementById("master");
    const children = document.querySelectorAll(".child");

    // When master checkbox is clicked
    master.addEventListener("change", () => {
        children.forEach(c => c.checked = master.checked);
        master.indeterminate = false;
    });

    // When any child checkbox is clicked
    children.forEach(child => {
        child.addEventListener("change", () => {
            const total = children.length;
            const checkedCount = Array.from(children).filter(c => c.checked).length;

            if (checkedCount === 0) {
                master.checked = false;
                master.indeterminate = false;
            }
            else if (checkedCount === total) {
                master.checked = true;
                master.indeterminate = false;
            }
            else {
                master.checked = false;
                master.indeterminate = true; // visual only
            }
        });
    });
</script>

</body>
</html>
