<!-- Collapsible Sidebar with Nested Items 

Goal: Sidebar sections expand/collapse; nested items toggle independently. 
Constraints: Maintain open state visually; persist state between reloads. 
Steps: 

Create 3 top-level sections with nested lists. 

Save open/closed state in local storage. 

Restore state on load. 
Success: Nested interactions feel intuitive; state persistence works.  -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Collapsible Sidebar</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f4f6fb;
}

.container {
    display: flex;
    min-height: 100vh;
}

.sidebar {
    width: 260px;
    background: #1e1f26;
    color: white;
    padding: 20px;
    transition: transform 0.3s ease;
}

.sidebar .logo {
    text-align: center;
    margin-bottom: 20px;
    font-size: 26px;
    color: #4cc9f0;
}

.section {
    margin-bottom: 15px;
}

.section-header {
    background: #2a2b33;
    padding: 12px;
    cursor: pointer;
    border-radius: 5px;
    transition: background 0.3s ease;
}

.section-header:hover {
    background: #383a45;
}

.nested {
    list-style: none;
    margin: 0;
    padding-left: 15px;
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.4s ease;
}

.nested li {
    padding: 8px;
    margin: 4px 0;
    background: #2d2f39;
    border-radius: 5px;
    cursor: pointer;
}

.nested li:hover {
    background: #40424e;
}

.section.open .nested {
    max-height: 300px;
}

.content {
    padding: 30px;
    flex: 1;
}

.toggle-btn {
    display: none;
    margin-bottom: 20px;
    background: #1e1f26;
    color: white;
    border: none;
    padding: 10px 15px;
    font-size: 20px;
    border-radius: 6px;
    cursor: pointer;
}

.toggle-btn:hover {
    background: #2a2b33;
}

/* MOBILE STYLE */
@media (max-width: 768px) {
    .sidebar {
        position: fixed;
        height: 100%;
        top: 0;
        left: 0;
        transform: translateX(-100%);
        z-index: 1000;
    }

    .sidebar.show {
        transform: translateX(0);
    }

    .toggle-btn {
        display: inline-block;
    }
}
</style>
</head>
<body>

<div class="container">
    <aside class="sidebar" id="sidebar">
        <h2 class="logo">MyMenu</h2>

        <div class="section" data-section="sec1">
            <div class="section-header">Section 1</div>
            <ul class="nested">
                <li>Item 1.1</li>
                <li>Item 1.2</li>
                <li>Item 1.3</li>
            </ul>
        </div>

        <div class="section" data-section="sec2">
            <div class="section-header">Section 2</div>
            <ul class="nested">
                <li>Item 2.1</li>
                <li>Item 2.2</li>
                <li>Item 2.3</li>
            </ul>
        </div>

        <div class="section" data-section="sec3">
            <div class="section-header">Section 3</div>
            <ul class="nested">
                <li>Item 3.1</li>
                <li>Item 3.2</li>
                <li>Item 3.3</li>
            </ul>
        </div>
    </aside>

    <main class="content">
        <button class="toggle-btn" id="toggleBtn">☰ Menu</button>
        <h1>Welcome!</h1>
        <p>Your collapsible sidebar with state persistence is ready.</p>
    </main>
</div>


<script>
// Restore state from localStorage
document.querySelectorAll(".section").forEach(section => {
    let key = section.dataset.section;
    let isOpen = localStorage.getItem(key);

    if (isOpen === "open") {
        section.classList.add("open");
    }
});

// Toggle section & save state
document.querySelectorAll(".section-header").forEach(header => {
    header.addEventListener("click", () => {
        let parent = header.parentElement;
        parent.classList.toggle("open");

        let key = parent.dataset.section;
        localStorage.setItem(key, parent.classList.contains("open") ? "open" : "closed");
    });
});

// Mobile sidebar toggle
const sidebar = document.getElementById("sidebar");
const toggleBtn = document.getElementById("toggleBtn");

toggleBtn.addEventListener("click", () => {
    sidebar.classList.toggle("show");
});
</script>

</body>
</html>
