<!-- Multi-Select Tags Input 

Goal: Convert a text input into a tag picker with removable tags. 
Constraints: Disallow duplicates; backspace deletes last tag when input empty. 
Steps: 

User types text and presses Enter to create a tag chip. 

Show a clear “x” on each tag to remove it. 

Maintain a hidden input containing comma-separated values for form submit. 
Success: Accurate tag set + hidden value always in sync.  -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rainbow Tag Input</title>

<style>
    body{
        font-family: "Poppins", sans-serif;
        background: linear-gradient(135deg, #ff9a9e, #fad0c4);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
        color: #fff;
    }

    .tag-container{
        width: 100%;
        max-width: 550px;
        min-height: 80px;
        background: rgba(255,255,255,0.15);
        backdrop-filter: blur(10px);
        padding: 16px;
        border-radius: 15px;
        box-shadow: 0 8px 30px rgba(0,0,0,0.2);
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        cursor: text;
        border: 2px solid rgba(255,255,255,0.3);
    }

    /* 🌈 Rainbow Palette for Tags */
    .tag:nth-child(6n){
        background: linear-gradient(45deg, #ff0000, #ff6a00); /* Red → Orange */
    }
    .tag:nth-child(6n + 1){
        background: linear-gradient(45deg, #ff6a00, #ffcc00); /* Orange → Yellow */
    }
    .tag:nth-child(6n + 2){
        background: linear-gradient(45deg, #ffcc00, #00cc00); /* Yellow → Green */
    }
    .tag:nth-child(6n + 3){
        background: linear-gradient(45deg, #00cc00, #0099ff); /* Green → Blue */
    }
    .tag:nth-child(6n + 4){
        background: linear-gradient(45deg, #0099ff, #6633ff); /* Blue → Indigo */
    }
    .tag:nth-child(6n + 5){
        background: linear-gradient(45deg, #6633ff, #cc00ff); /* Indigo → Violet */
    }

    .tag{
        color: white;
        padding: 7px 12px;
        border-radius: 25px;
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 14px;
        font-weight: 600;
        animation: fadeIn 0.25s ease;
        box-shadow: 0 3px 10px rgba(0,0,0,0.25);
    }

    .tag .remove{
        cursor: pointer;
        background: rgba(255,255,255,0.35);
        padding: 0 6px;
        border-radius: 50%;
        font-weight: bold;
    }

    @keyframes fadeIn{
        from { opacity: 0; transform: scale(0.85); }
        to { opacity: 1; transform: scale(1); }
    }

    .tag-container input{
        border: none;
        outline: none;
        padding: 10px;
        font-size: 15px;
        flex: 1;
        min-width: 150px;
        background: transparent;
        color: white;
    }

    .tag-container input::placeholder{
        color: rgba(255,255,255,0.65);
    }

    @media (max-width: 480px){
        .tag-container{
            padding: 12px;
        }
        .tag{
            font-size: 13px;
        }
    }
</style>
</head>
<body>

<div class="tag-container" id="tagBox" onclick="input.focus()">
    <input type="text" id="tagInput" placeholder="Type and press Enter...">
</div>

<input type="hidden" id="hiddenTags" name="tags">

<script>
    const tagBox = document.getElementById("tagBox");
    const input = document.getElementById("tagInput");
    const hidden = document.getElementById("hiddenTags");

    let tags = [];

    function updateHiddenInput(){
        hidden.value = tags.join(",");
    }

    function createTag(label){
        const tag = document.createElement("div");
        tag.className = "tag";

        const text = document.createElement("span");
        text.textContent = label;

        const removeBtn = document.createElement("div");
        removeBtn.className = "remove";
        removeBtn.textContent = "✕";

        removeBtn.onclick = () => {
            tags = tags.filter(t => t !== label);
            tag.remove();
            updateHiddenInput();
        };

        tag.appendChild(text);
        tag.appendChild(removeBtn);
        tagBox.insertBefore(tag, input);
    }

    input.addEventListener("keydown", (e) => {
        const value = input.value.trim();

        if (e.key === "Enter" && value !== "") {
            e.preventDefault();
            if (!tags.includes(value.toLowerCase())) {
                tags.push(value.toLowerCase());
                createTag(value);
            }
            input.value = "";
            updateHiddenInput();
        }

        if (e.key === "Backspace" && value === "") {
            if (tags.length > 0) {
                const lastTag = tags.pop();
                const tagElement = [...tagBox.querySelectorAll(".tag")]
                    .find(t => t.innerText.includes(lastTag));
                if (tagElement) tagElement.remove();
                updateHiddenInput();
            }
        }
    });
</script>
</body>
</html>
