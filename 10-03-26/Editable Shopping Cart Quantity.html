<!-- Editable Shopping Cart Quantity 

Goal: Update item totals and grand total when quantities change. 
Constraints: Min quantity 0; non-numeric input resets to last valid. 
Steps: 

Table: Item, Price, Quantity, Subtotal. 

Typing in Quantity recalculates Subtotal and Grand Total live. 

Disable “Checkout” if Grand Total is 0. 
Success: All totals accurate in real-time; invalid inputs handled gracefully.  -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Responsive Cart Calculator</title>

<style>
    body{
        font-family: Arial, sans-serif;
        background:#f5f5f5;
        padding:20px;
    }

    .container{
        max-width:900px;
        margin:auto;
        background:white;
        padding:20px;
        border-radius:10px;
        box-shadow:0 4px 10px rgba(0,0,0,0.1);
    }

    h2{
        text-align:center;
        margin-bottom:20px;
    }

    table{
        width:100%;
        border-collapse:collapse;
    }

    th, td{
        padding:12px;
        text-align:center;
        border-bottom:1px solid #ddd;
    }

    th{
        background:#3498db;
        color:white;
    }

    input[type="number"]{

        font-weight:bold;
    }

    button{
        padding:12px 20px;
        border:none;
        background:#27ae60;
        color:white;
        font-size:18px;
        border-radius:6px;
        cursor:pointer;
        margin-top:15px;
    }

    button:disabled{
        background:gray;
        cursor:not-allowed;
    }

    /* Responsive Table */
    @media (max-width:600px){
        table, thead, tbody, th, td, tr{
            display:block;
        }

        thead tr{
            display:none;
        }

        tr{
            margin-bottom:15px;
            background:#fff;
            border-radius:10px;
            padding:10px;
            box-shadow:0 2px 5px rgba(0,0,0,0.1);
        }

        td{
            text-align:right;
            padding-left:50%;
            position:relative;
            border-bottom:none;
        }

        td::before{
            content:attr(data-label);
            position:absolute;
            left:10px;
            width:45%;
            font-weight:bold;
            text-align:left;
        }
    }
</style>

</head>
<body>

<div class="container">
    <h2>Shopping Cart</h2>

    <table>
        <thead>
            <tr>
                <th>Item</th>
                <th>Price (₹)</th>
                <th>Quantity</th>
                <th>Subtotal (₹)</th>
            </tr>
        </thead>
        <tbody id="cartBody">
            <tr>
                <td data-label="Item">Laptop</td>
                <td data-label="Price" class="price">50000</td>
                <td data-label="Quantity">
                    <input type="number" class="qty" value="0" min="0">
                </td>
                <td data-label="Subtotal" class="subtotal">0</td>
            </tr>

            <tr>
                <td data-label="Item">Headphones</td>
                <td data-label="Price" class="price">2500</td>
                <td data-label="Quantity">
                    <input type="number" class="qty" value="0" min="0">
                </td>
                <td data-label="Subtotal" class="subtotal">0</td>
            </tr>

            <tr>
                <td data-label="Item">Mouse</td>
                <td data-label="Price" class="price">800</td>
                <td data-label="Quantity">
                    <input type="number" class="qty" value="0" min="0">
                </td>
                <td data-label="Subtotal" class="subtotal">0</td>
            </tr>
        </tbody>
    </table>

    <div class="summary">
        Grand Total: ₹ <span id="grandTotal">0</span>
    </div>

    <button id="checkoutBtn" disabled>Checkout</button>
</div>


<script>
const qtyInputs = document.querySelectorAll(".qty");
const checkoutBtn = document.getElementById("checkoutBtn");
const grandTotalEl = document.getElementById("grandTotal");

qtyInputs.forEach((input) => {
    let lastValid = 0;

    input.addEventListener("input", function () {
        let value = this.value;

        // Validation
        if (value === "" || isNaN(value) || Number(value) < 0) {
            this.value = lastValid;
            return;
        }

        lastValid = Number(value);
        updateTotals();
    });
});

function updateTotals() {
    let rows = document.querySelectorAll("#cartBody tr");
    let grandTotal = 0;

    rows.forEach(row => {
        let price = Number(row.querySelector(".price").textContent);
        let qty = Number(row.querySelector(".qty").value);
        let subtotal = price * qty;

        row.querySelector(".subtotal").textContent = subtotal;
        grandTotal += subtotal;
    });

    grandTotalEl.textContent = grandTotal;
    checkoutBtn.disabled = grandTotal === 0;
}
</script>

</body>
</html>
