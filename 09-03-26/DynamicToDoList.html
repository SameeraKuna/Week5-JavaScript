<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(120deg,#667eea,#764ba2);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    transition:0.3s;
}

/* DARK MODE */
body.dark{
    background:#121212;
}

.container{
    width:90%;
    max-width:400px;
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
    transition:0.3s;
}

body.dark .container{
    background:#1e1e1e;
    color:white;
}

h2{
    text-align:center;
}

.input-group{
    display:flex;
    gap:10px;
}

input{
    flex:1;
    padding:10px;
    border-radius:6px;
    border:1px solid #ccc;
}

button{
    padding:10px 15px;
    border:none;
    background:#667eea;
    color:white;
    border-radius:6px;
    cursor:pointer;
}

ul{
    list-style:none;
    padding:0;
    margin-top:20px;
}

li{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:10px;
    margin-bottom:10px;
    background:#f2f2f2;
    border-radius:6px;
    transition:0.3s;
}

body.dark li{
    background:#333;
}

li.completed span{
    text-decoration:line-through;
    color:gray;
}

.task{
    display:flex;
    align-items:center;
    gap:10px;
    flex:1;
}

.actions button{
    margin-left:5px;
    padding:5px 8px;
}

.delete{
    background:red;
}

.edit{
    background:orange;
}

.dark-toggle{
    width:100%;
    margin-top:10px;
    background:#333;
}

@media(max-width:500px){
    button{
        padding:8px;
        font-size:12px;
    }
}

</style>
</head>

<body>

<div class="container">

<h2>Todo List</h2>

<div class="input-group">
<input type="text" id="taskInput" placeholder="Enter task">
<button id="addBtn">Add</button>
</div>

<button id="darkBtn" class="dark-toggle">Toggle Dark Mode</button>

<ul id="todoList"></ul>

</div>

<script>

let addBtn = document.getElementById("addBtn");
let taskInput = document.getElementById("taskInput");
let todoList = document.getElementById("todoList");
let darkBtn = document.getElementById("darkBtn");


// ✅ ADD TASK AT TOP
addBtn.addEventListener("click",function(){

    let text = taskInput.value.trim();
    if(text==="") return;

    let li = document.createElement("li");

    li.innerHTML = `
        <div class="task">
            <input type="checkbox" class="check">
            <span>${text}</span>
        </div>
        <div class="actions">
            <button class="edit">✏️</button>
            <button class="delete">❌</button>
        </div>
    `;

    todoList.prepend(li);
    taskInput.value="";
});


// ✅ EVENT DELEGATION (ONLY ONE LISTENER)
todoList.addEventListener("click",function(e){

    let li = e.target.closest("li");

    // DELETE
    if(e.target.classList.contains("delete")){
        li.remove();
    }

    // EDIT
    else if(e.target.classList.contains("edit")){
        let span = li.querySelector("span");
        let newText = prompt("Edit task:", span.textContent);
        if(newText!==null && newText.trim()!==""){
            span.textContent = newText;
        }
    }

});


// ✅ CHECKBOX TOGGLE COMPLETE
todoList.addEventListener("change",function(e){

    if(e.target.classList.contains("check")){
        let li = e.target.closest("li");
        li.classList.toggle("completed");
    }

});


// ✅ DARK MODE
darkBtn.addEventListener("click",function(){
    document.body.classList.toggle("dark");
});

</script>

</body>
</html>
