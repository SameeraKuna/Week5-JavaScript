<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Accessible Tabs</title>

<style>

body{
  font-family: Arial;
  margin:0;
  padding:20px;
  background:#f2f2f2;
}

/* Container */
.tab-container{
  max-width:700px;
  margin:auto;
  background:white;
  padding:20px;
  border-radius:8px;
  box-shadow:0 0 10px rgba(0,0,0,0.1);
}

/* Tab List */
.tab-list{
  display:flex;
  flex-wrap:wrap;
  border-bottom:2px solid #ddd;
}

/* Tabs */
.tab{
  flex:1;
  padding:12px;
  cursor:pointer;
  background:#eee;
  border:none;
  outline:none;
  font-size:16px;
}

/* Active Tab */
.tab[aria-selected="true"]{
  background:#4CAF50;
  color:white;
}

/* Panels */
.tab-panel{
  display:none;
  padding:20px;
  animation:fade 0.3s ease;
}

.tab-panel.active{
  display:block;
}

@keyframes fade{
  from{opacity:0;}
  to{opacity:1;}
}

/* Responsive */
@media(max-width:600px){
  .tab{
    font-size:14px;
    padding:10px;
  }
}

</style>
</head>

<body>

<div class="tab-container">

<!-- TAB LIST -->
<div class="tab-list" role="tablist">

<button class="tab"
role="tab"
aria-selected="true"
aria-controls="panel1"
id="tab1"
tabindex="0">Home</button>

<button class="tab"
role="tab"
aria-selected="false"
aria-controls="panel2"
id="tab2"
tabindex="-1">About</button>

<button class="tab"
role="tab"
aria-selected="false"
aria-controls="panel3"
id="tab3"
tabindex="-1">Services</button>

<button class="tab"
role="tab"
aria-selected="false"
aria-controls="panel4"
id="tab4"
tabindex="-1">Contact</button>

</div>

<!-- PANELS -->
<div id="panel1" class="tab-panel active" role="tabpanel" aria-labelledby="tab1">
<h3>Home</h3>
<p>This is Home Panel</p>
</div>

<div id="panel2" class="tab-panel" role="tabpanel" aria-labelledby="tab2">
<h3>About</h3>
<p>This is About Panel</p>
</div>

<div id="panel3" class="tab-panel" role="tabpanel" aria-labelledby="tab3">
<h3>Services</h3>
<p>This is Services Panel</p>
</div>

<div id="panel4" class="tab-panel" role="tabpanel" aria-labelledby="tab4">
<h3>Contact</h3>
<p>This is Contact Panel</p>
</div>

</div>

<script>

const tabs = document.querySelectorAll(".tab");
const panels = document.querySelectorAll(".tab-panel");

function activateTab(tab){

  tabs.forEach(t=>{
    t.setAttribute("aria-selected","false");
    t.setAttribute("tabindex","-1");
  });

  panels.forEach(p=>{
    p.classList.remove("active");
  });

  tab.setAttribute("aria-selected","true");
  tab.setAttribute("tabindex","0");
  tab.focus();

  const panel = document.getElementById(tab.getAttribute("aria-controls"));
  panel.classList.add("active");
}

/* CLICK SUPPORT */
tabs.forEach(tab=>{
  tab.addEventListener("click",()=>{
    activateTab(tab);
  });
});

/* KEYBOARD SUPPORT */
tabs.forEach((tab,index)=>{

  tab.addEventListener("keydown",(e)=>{

    let newIndex;

    if(e.key === "ArrowRight"){
      newIndex = (index+1) % tabs.length;
      activateTab(tabs[newIndex]);
    }

    if(e.key === "ArrowLeft"){
      newIndex = (index-1+tabs.length) % tabs.length;
      activateTab(tabs[newIndex]);
    }

    if(e.key === "Home"){
      activateTab(tabs[0]);
    }

    if(e.key === "End"){
      activateTab(tabs[tabs.length-1]);
    }

  });

});

</script>

</body>
</html>
