<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Active NavBar</title>

<style>

/* ===== RESET ===== */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial;
}

body{
  background:#f1f5f9;
}

/* ===== NAVBAR ===== */
.navbar{
  background:#111827;
  padding:15px 10px;
}

/* ===== MENU ===== */
.nav-menu{
  list-style:none;
  display:flex;
  justify-content:center;
  position:relative;
  flex-wrap:wrap;
}

/* ===== EACH ITEM ===== */
.nav-item{
  position:relative;
  margin:5px;
}

/* ===== LINK ===== */
.nav-link{
  text-decoration:none;
  color:white;
  padding:12px 25px;
  display:flex;
  align-items:center;
  gap:8px;
  position:relative;
  z-index:2;
  transition:.3s;
}

/* ===== ICON ===== */
.icon{
  font-size:18px;
  transition:.3s;
}

/* ===== UNDERLINE ===== */
.nav-link::after{
  content:"";
  position:absolute;
  width:0%;
  height:3px;
  background:#38bdf8;
  bottom:-5px;
  left:0;
  transition:.3s;
}

/* ===== ACTIVE UNDERLINE ===== */
.nav-link.active::after{
  width:100%;
}

/* ===== ACTIVE TEXT ===== */
.nav-link.active{
  color:#38bdf8;
}

/* ===== ACTIVE ICON CHANGE ===== */
.nav-link.active .icon{
  transform:scale(1.4);
  color:#38bdf8;
}

/* ===== SLIDING ACTIVE BAR ===== */
.slider{
  position:absolute;
  height:45px;
  background:#1e293b;
  border-radius:25px;
  top:0;
  left:0;
  transition:.4s ease;
  z-index:1;
}

/* ===== RESPONSIVE ===== */
@media(max-width:600px){

.nav-menu{
  flex-direction:column;
  align-items:center;
}

.slider{
  display:none;
}

.nav-link{
  width:80%;
  justify-content:center;
}

}

</style>
</head>

<body>

<nav class="navbar">
<ul class="nav-menu">

<div class="slider"></div>

<li class="nav-item">
<a href="#" class="nav-link active">
<span class="icon">🏠</span> Home
</a>
</li>

<li class="nav-item">
<a href="#" class="nav-link">
<span class="icon">👤</span> About
</a>
</li>

<li class="nav-item">
<a href="#" class="nav-link">
<span class="icon">💼</span> Services
</a>
</li>

<li class="nav-item">
<a href="#" class="nav-link">
<span class="icon">📂</span> Portfolio
</a>
</li>

<li class="nav-item">
<a href="#" class="nav-link">
<span class="icon">✉</span> Contact
</a>
</li>

</ul>
</nav>

<script>

let links = document.querySelectorAll(".nav-link");
let slider = document.querySelector(".slider");

/* ===== INITIAL SLIDER POSITION ===== */
function moveSlider(element){
  slider.style.width = element.offsetWidth + "px";
  slider.style.left = element.offsetLeft + "px";
}

/* first active item */
moveSlider(document.querySelector(".nav-link.active"));

/* ===== CLICK EVENT ===== */
links.forEach(function(link){

link.addEventListener("click",function(e){

e.preventDefault();

/* remove old active */
links.forEach(function(item){
item.classList.remove("active");
});

/* add new active */
this.classList.add("active");

/* move sliding bar */
moveSlider(this);

});

});

/* ===== ADJUST ON RESIZE ===== */
window.addEventListener("resize",function(){
let active = document.querySelector(".nav-link.active");
moveSlider(active);
});

</script>

</body>
</html>
