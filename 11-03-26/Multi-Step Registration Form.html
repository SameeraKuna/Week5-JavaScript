<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Step Registration Form</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            width: 100%;
            max-width: 700px;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Stepper Styles */
        .stepper-container {
            padding: 40px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .stepper {
            display: flex;
            justify-content: space-between;
            position: relative;
            margin-bottom: 10px;
        }

        .stepper::before {
            content: '';
            position: absolute;
            top: 20px;
            left: 0;
            right: 0;
            height: 2px;
            background: #ddd;
            z-index: 1;
        }

        .step {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            z-index: 2;
        }

        .step-number {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: white;
            color: #667eea;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 10px;
            border: 3px solid white;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .step-number:hover {
            transform: scale(1.1);
        }

        .step.active .step-number {
            background: #ffc107;
            color: white;
            box-shadow: 0 0 20px rgba(255, 193, 7, 0.5);
        }

        .step.completed .step-number {
            background: #28a745;
            color: white;
        }

        .step-number::after {
            content: '';
            display: none;
        }

        .step.completed .step-number::after {
            content: '✓';
            display: inline;
        }

        .step-label {
            font-size: 12px;
            color: white;
            text-align: center;
            margin-top: 5px;
            font-weight: 500;
        }

        .stepper-title {
            text-align: center;
            color: white;
            font-size: 20px;
            font-weight: bold;
            margin-top: 20px;
        }

        /* Form Styles */
        .form-container {
            padding: 40px;
        }

        .form-section {
            display: none;
            animation: fadeIn 0.3s ease-in;
        }

        .form-section.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"],
        input[type="tel"],
        select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.3s ease;
            background: #f8f9fa;
        }

        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="password"]:focus,
        input[type="tel"]:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        input.error,
        select.error {
            border-color: #dc3545;
            background: #fff5f5;
        }

        .error-message {
            color: #dc3545;
            font-size: 12px;
            margin-top: 5px;
            display: none;
            animation: shake 0.3s ease;
        }

        .error-message.show {
            display: block;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .success-message {
            background: #d4edda;
            color: #155724;
            padding: 12px 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
            animation: slideDown 0.3s ease;
        }

        .success-message.show {
            display: block;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form-row.full {
            grid-template-columns: 1fr;
        }

        /* Review Section */
        .review-section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .review-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #e0e0e0;
        }

        .review-item:last-child {
            border-bottom: none;
        }

        .review-label {
            font-weight: 600;
            color: #555;
        }

        .review-value {
            color: #333;
        }

        .edit-btn {
            background: none;
            border: none;
            color: #667eea;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            margin-left: 10px;
            transition: all 0.3s ease;
        }

        .edit-btn:hover {
            color: #764ba2;
            text-decoration: underline;
        }

        .password-strength {
            height: 4px;
            background: #e0e0e0;
            border-radius: 2px;
            margin-top: 5px;
            overflow: hidden;
        }

        .password-strength-bar {
            height: 100%;
            width: 0%;
            transition: all 0.3s ease;
            border-radius: 2px;
        }

        .password-strength-bar.weak {
            width: 33%;
            background: #dc3545;
        }

        .password-strength-bar.medium {
            width: 66%;
            background: #ffc107;
        }

        .password-strength-bar.strong {
            width: 100%;
            background: #28a745;
        }

        .password-strength-text {
            font-size: 11px;
            margin-top: 3px;
            display: none;
        }

        .password-strength-text.show {
            display: block;
        }

        .password-strength-text.weak {
            color: #dc3545;
        }

        .password-strength-text.medium {
            color: #ffc107;
        }

        .password-strength-text.strong {
            color: #28a745;
        }

        /* Navigation Buttons */
        .form-navigation {
            display: flex;
            justify-content: space-between;
            gap: 15px;
            margin-top: 30px;
            padding-top: 30px;
            border-top: 1px solid #e0e0e0;
        }

        button {
            padding: 12px 30px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
            flex: 1;
        }

        .btn-prev {
            background: #e0e0e0;
            color: #333;
            display: none;
        }

        .btn-prev:hover:not(:disabled) {
            background: #d0d0d0;
        }

        .btn-prev.show {
            display: flex;
            justify-content: center;
        }

        .btn-next,
        .btn-submit {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-next:hover:not(:disabled),
        .btn-submit:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-next:active:not(:disabled),
        .btn-submit:active:not(:disabled) {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-submit {
            flex: 2;
        }

        .btn-restart {
            background: #667eea;
            color: white;
            width: 100%;
        }

        .btn-restart:hover {
            background: #764ba2;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        /* Success Modal */
        .success-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            animation: fadeIn 0.3s ease;
        }

        .success-modal.show {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 12px;
            text-align: center;
            max-width: 400px;
            animation: slideUp 0.3s ease;
        }

        .success-icon {
            font-size: 60px;
            margin-bottom: 20px;
            animation: bounce 0.6s ease;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .modal-content h2 {
            color: #28a745;
            margin-bottom: 10px;
            font-size: 24px;
        }

        .modal-content p {
            color: #666;
            margin-bottom: 20px;
            font-size: 14px;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .container {
                max-width: 100%;
                border-radius: 0;
            }

            .form-container {
                padding: 30px 20px;
            }

            .stepper-container {
                padding: 30px 15px;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .stepper {
                font-size: 12px;
            }

            .step-number {
                width: 35px;
                height: 35px;
                font-size: 13px;
            }

            .step-label {
                font-size: 10px;
            }

            .stepper-title {
                font-size: 16px;
            }

            .form-navigation {
                gap: 10px;
            }

            button {
                padding: 10px 15px;
                font-size: 13px;
            }

            .modal-content {
                margin: 20px;
            }
        }

        @media (max-width: 480px) {
            .form-container {
                padding: 20px;
            }

            .stepper-container {
                padding: 20px 10px;
            }

            .stepper::before {
                top: 17px;
            }

            .step-number {
                width: 32px;
                height: 32px;
                font-size: 12px;
                border-width: 2px;
            }

            .step-label {
                font-size: 9px;
                max-width: 60px;
            }

            .stepper-title {
                font-size: 14px;
                margin-top: 15px;
            }

            .form-group {
                margin-bottom: 15px;
            }

            label {
                font-size: 13px;
                margin-bottom: 6px;
            }

            input,
            select {
                padding: 10px 12px;
                font-size: 13px;
            }

            .form-navigation {
                margin-top: 20px;
                padding-top: 20px;
                flex-direction: column-reverse;
            }

            .btn-next,
            .btn-submit,
            .btn-prev,
            .btn-restart {
                width: 100%;
            }

            .modal-content {
                padding: 30px 20px;
            }

            .success-icon {
                font-size: 50px;
            }

            .modal-content h2 {
                font-size: 20px;
            }
        }

        /* Loading State */
        .loading {
            display: inline-block;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: white;
            animation: blink 0.6s infinite;
        }

        .loading:nth-child(2) {
            animation-delay: 0.2s;
        }

        .loading:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes blink {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Stepper -->
        <div class="stepper-container">
            <div class="stepper">
                <div class="step active" data-step="1">
                    <div class="step-number">1</div>
                    <div class="step-label">Personal</div>
                </div>
                <div class="step" data-step="2">
                    <div class="step-number">2</div>
                    <div class="step-label">Address</div>
                </div>
                <div class="step" data-step="3">
                    <div class="step-number">3</div>
                    <div class="step-label">Account</div>
                </div>
                <div class="step" data-step="4">
                    <div class="step-number">4</div>
                    <div class="step-label">Review</div>
                </div>
            </div>
            <div class="stepper-title" id="stepperTitle">Step 1: Personal Information</div>
        </div>

        <!-- Form Sections -->
        <form id="registrationForm">
            <div class="form-container">
                <!-- Step 1: Personal Information -->
                <div class="form-section active" data-section="1">
                    <div class="form-group">
                        <label for="fullName">Full Name</label>
                        <input type="text" id="fullName" name="fullName" placeholder="Enter your full name" required>
                        <div class="error-message" id="fullNameError"></div>
                    </div>

                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" placeholder="Enter your email" required>
                        <div class="error-message" id="emailError"></div>
                    </div>

                    <div class="form-group">
                        <label for="phone">Phone Number</label>
                        <input type="tel" id="phone" name="phone" placeholder="Enter your phone number" required>
                        <div class="error-message" id="phoneError"></div>
                    </div>
                </div>

                <!-- Step 2: Address Details -->
                <div class="form-section" data-section="2">
                    <div class="form-group">
                        <label for="street">Street Address</label>
                        <input type="text" id="street" name="street" placeholder="Enter street address" required>
                        <div class="error-message" id="streetError"></div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="city">City</label>
                            <input type="text" id="city" name="city" placeholder="Enter city" required>
                            <div class="error-message" id="cityError"></div>
                        </div>
                        <div class="form-group">
                            <label for="postalCode">Postal Code</label>
                            <input type="text" id="postalCode" name="postalCode" placeholder="Enter postal code" required>
                            <div class="error-message" id="postalCodeError"></div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="country">Country</label>
                        <select id="country" name="country" required>
                            <option value="">Select a country</option>
                        </select>
                        <div class="error-message" id="countryError"></div>
                    </div>
                </div>

                <!-- Step 3: Account Setup -->
                <div class="form-section" data-section="3">
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" name="username" placeholder="Choose a username" required>
                        <div class="error-message" id="usernameError"></div>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" placeholder="Enter password" required>
                        <div class="password-strength">
                            <div class="password-strength-bar" id="strengthBar"></div>
                        </div>
                        <div class="password-strength-text" id="strengthText"></div>
                        <div class="error-message" id="passwordError"></div>
                    </div>

                    <div class="form-group">
                        <label for="confirmPassword">Confirm Password</label>
                        <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm password" required>
                        <div class="error-message" id="confirmPasswordError"></div>
                    </div>

                    <div class="success-message" id="passwordMatch">✓ Passwords match</div>
                </div>

                <!-- Step 4: Review & Submit -->
                <div class="form-section" data-section="4">
                    <h3 style="margin-bottom: 20px; color: #333;">Please Review Your Information</h3>
                    <div class="review-section">
                        <div class="review-item">
                            <span class="review-label">Full Name:</span>
                            <span><span class="review-value" data-review="fullName"></span> <button type="button" class="edit-btn" onclick="goToStep(1)">Edit</button></span>
                        </div>
                        <div class="review-item">
                            <span class="review-label">Email:</span>
                            <span><span class="review-value" data-review="email"></span> <button type="button" class="edit-btn" onclick="goToStep(1)">Edit</button></span>
                        </div>
                        <div class="review-item">
                            <span class="review-label">Phone:</span>
                            <span><span class="review-value" data-review="phone"></span> <button type="button" class="edit-btn" onclick="goToStep(1)">Edit</button></span>
                        </div>
                        <div class="review-item">
                            <span class="review-label">Street:</span>
                            <span><span class="review-value" data-review="street"></span> <button type="button" class="edit-btn" onclick="goToStep(2)">Edit</button></span>
                        </div>
                        <div class="review-item">
                            <span class="review-label">City:</span>
                            <span><span class="review-value" data-review="city"></span> <button type="button" class="edit-btn" onclick="goToStep(2)">Edit</button></span>
                        </div>
                        <div class="review-item">
                            <span class="review-label">Postal Code:</span>
                            <span><span class="review-value" data-review="postalCode"></span> <button type="button" class="edit-btn" onclick="goToStep(2)">Edit</button></span>
                        </div>
                        <div class="review-item">
                            <span class="review-label">Country:</span>
                            <span><span class="review-value" data-review="country"></span> <button type="button" class="edit-btn" onclick="goToStep(2)">Edit</button></span>
                        </div>
                        <div class="review-item">
                            <span class="review-label">Username:</span>
                            <span><span class="review-value" data-review="username"></span> <button type="button" class="edit-btn" onclick="goToStep(3)">Edit</button></span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Navigation Buttons -->
            <div class="form-container" style="padding-top: 0;">
                <div class="form-navigation">
                    <button type="button" class="btn-prev" id="prevBtn" onclick="previousStep()">← Previous</button>
                    <button type="button" class="btn-next" id="nextBtn" onclick="nextStep()">Next →</button>
                    <button type="submit" class="btn-submit" id="submitBtn" style="display: none;">Submit</button>
                </div>
            </div>
        </form>
    </div>

    <!-- Success Modal -->
    <div class="success-modal" id="successModal">
        <div class="modal-content">
            <div class="success-icon">✓</div>
            <h2>Registration Successful!</h2>
            <p>Your account has been created successfully. Welcome!</p>
            <button class="btn-restart" onclick="restartForm()">Start New Registration</button>
        </div>
    </div>

    <script>
        // Form Data Manager
        class FormManager {
            constructor() {
                this.currentStep = 1;
                this.totalSteps = 4;
                this.formData = this.loadFormData();
                this.countries = [];
                this.init();
            }

            init() {
                this.setupEventListeners();
                this.loadCountries();
                this.updateStepperUI();
                this.restoreFormData();
            }

            setupEventListeners() {
                // Real-time validation that also updates navigation state
                const watchInputs = [
                    {id: 'fullName', fn: () => this.validateFullName()},
                    {id: 'email', fn: () => this.validateEmail()},
                    {id: 'phone', fn: () => this.validatePhone()},
                    {id: 'street', fn: () => this.validateStreet()},
                    {id: 'city', fn: () => this.validateCity()},
                    {id: 'postalCode', fn: () => this.validatePostalCode()},
                ];

                watchInputs.forEach(({id, fn}) => {
                    document.getElementById(id).addEventListener('input', () => {
                        fn();
                        this.updateNavigationButtons();
                    });
                });

                document.getElementById('country').addEventListener('change', () => {
                    this.validateCountry();
                    this.updateNavigationButtons();
                });

                document.getElementById('username').addEventListener('input', () => {
                    this.validateUsername();
                    this.updateNavigationButtons();
                });

                document.getElementById('password').addEventListener('input', () => {
                    this.validatePassword();
                    this.checkPasswordStrength();
                    this.checkPasswordMatch();
                    this.updateNavigationButtons();
                });

                document.getElementById('confirmPassword').addEventListener('input', () => {
                    this.checkPasswordMatch();
                    this.updateNavigationButtons();
                });

                // Form submission
                document.getElementById('registrationForm').addEventListener('submit', (e) => {
                    e.preventDefault();
                    this.submitForm();
                });

                // Stepper click navigation
                document.querySelectorAll('.step').forEach(step => {
                    step.addEventListener('click', (e) => {
                        const stepNum = parseInt(step.dataset.step);
                        if (stepNum < this.currentStep || step.classList.contains('completed')) {
                            this.goToStep(stepNum);
                        }
                    });
                });
            }

            // Validation Methods
            validateFullName() {
                const fullName = document.getElementById('fullName');
                const error = document.getElementById('fullNameError');
                const isValid = fullName.value.trim().length >= 3;

                if (!isValid && fullName.value.trim().length > 0) {
                    error.textContent = 'Full name must be at least 3 characters';
                    error.classList.add('show');
                    fullName.classList.add('error');
                } else {
                    error.classList.remove('show');
                    fullName.classList.remove('error');
                }
                return isValid || fullName.value.trim().length === 0;
            }

            validateEmail() {
                const email = document.getElementById('email');
                const error = document.getElementById('emailError');
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                const isValid = emailRegex.test(email.value);

                if (!isValid && email.value.length > 0) {
                    error.textContent = 'Please enter a valid email address';
                    error.classList.add('show');
                    email.classList.add('error');
                } else {
                    error.classList.remove('show');
                    email.classList.remove('error');
                }
                return isValid || email.value.length === 0;
            }

            validatePhone() {
                const phone = document.getElementById('phone');
                const error = document.getElementById('phoneError');
                const phoneRegex = /^\+?[\d\s-()]{10,}$/;
                const isValid = phoneRegex.test(phone.value);

                if (!isValid && phone.value.length > 0) {
                    error.textContent = 'Please enter a valid phone number';
                    error.classList.add('show');
                    phone.classList.add('error');
                } else {
                    error.classList.remove('show');
                    phone.classList.remove('error');
                }
                return isValid || phone.value.length === 0;
            }

            validateStreet() {
                const street = document.getElementById('street');
                const error = document.getElementById('streetError');
                const isValid = street.value.trim().length >= 3;

                if (!isValid && street.value.trim().length > 0) {
                    error.textContent = 'Street address must be at least 3 characters';
                    error.classList.add('show');
                    street.classList.add('error');
                } else {
                    error.classList.remove('show');
                    street.classList.remove('error');
                }
                return isValid || street.value.trim().length === 0;
            }

            validateCity() {
                const city = document.getElementById('city');
                const error = document.getElementById('cityError');
                const isValid = city.value.trim().length >= 2;

                if (!isValid && city.value.trim().length > 0) {
                    error.textContent = 'City must be at least 2 characters';
                    error.classList.add('show');
                    city.classList.add('error');
                } else {
                    error.classList.remove('show');
                    city.classList.remove('error');
                }
                return isValid || city.value.trim().length === 0;
            }

            validatePostalCode() {
                const postalCode = document.getElementById('postalCode');
                const error = document.getElementById('postalCodeError');
                const isValid = postalCode.value.trim().length >= 2;

                if (!isValid && postalCode.value.trim().length > 0) {
                    error.textContent = 'Postal code must be at least 2 characters';
                    error.classList.add('show');
                    postalCode.classList.add('error');
                } else {
                    error.classList.remove('show');
                    postalCode.classList.remove('error');
                }
                return isValid || postalCode.value.trim().length === 0;
            }

            validateCountry() {
                const country = document.getElementById('country');
                const error = document.getElementById('countryError');
                const isValid = country.value !== '';

                if (!isValid) {
                    error.textContent = 'Please select a country';
                    error.classList.add('show');
                    country.classList.add('error');
                } else {
                    error.classList.remove('show');
                    country.classList.remove('error');
                }
                return isValid;
            }

            validateUsername() {
                const username = document.getElementById('username');
                const error = document.getElementById('usernameError');
                const isValid = username.value.trim().length >= 3 && /^[a-zA-Z0-9_]+$/.test(username.value);

                if (!isValid && username.value.trim().length > 0) {
                    error.textContent = 'Username must be at least 3 characters and contain only letters, numbers, and underscores';
                    error.classList.add('show');
                    username.classList.add('error');
                } else {
                    error.classList.remove('show');
                    username.classList.remove('error');
                }
                return isValid || username.value.trim().length === 0;
            }

            validatePassword() {
                const password = document.getElementById('password');
                const error = document.getElementById('passwordError');
                const isValid = password.value.length >= 6;

                if (!isValid && password.value.length > 0) {
                    error.textContent = 'Password must be at least 6 characters';
                    error.classList.add('show');
                    password.classList.add('error');
                } else {
                    error.classList.remove('show');
                    password.classList.remove('error');
                }
                return isValid || password.value.length === 0;
            }

            checkPasswordStrength() {
                const password = document.getElementById('password');
                const strengthBar = document.getElementById('strengthBar');
                const strengthText = document.getElementById('strengthText');
                const pwd = password.value;

                let strength = 0;
                if (pwd.length >= 6) strength++;
                if (/[a-z]/.test(pwd) && /[A-Z]/.test(pwd)) strength++;
                if (/\d/.test(pwd)) strength++;
                if (/[^a-zA-Z\d]/.test(pwd)) strength++;

                strengthBar.className = 'password-strength-bar';
                strengthText.className = 'password-strength-text';

                if (pwd.length === 0) {
                    strengthBar.classList.remove('weak', 'medium', 'strong');
                    strengthText.classList.remove('show', 'weak', 'medium', 'strong');
                } else if (strength < 2) {
                    strengthBar.classList.add('weak');
                    strengthText.textContent = 'Weak password';
                    strengthText.classList.add('show', 'weak');
                } else if (strength < 4) {
                    strengthBar.classList.add('medium');
                    strengthText.textContent = 'Medium strength';
                    strengthText.classList.add('show', 'medium');
                } else {
                    strengthBar.classList.add('strong');
                    strengthText.textContent = 'Strong password';
                    strengthText.classList.add('show', 'strong');
                }
            }

            checkPasswordMatch() {
                const password = document.getElementById('password');
                const confirmPassword = document.getElementById('confirmPassword');
                const matchMessage = document.getElementById('passwordMatch');
                const error = document.getElementById('confirmPasswordError');

                if (confirmPassword.value === '') {
                    matchMessage.classList.remove('show');
                    error.classList.remove('show');
                    confirmPassword.classList.remove('error');
                    return;
                }

                if (password.value === confirmPassword.value) {
                    matchMessage.classList.add('show');
                    error.classList.remove('show');
                    confirmPassword.classList.remove('error');
                } else {
                    matchMessage.classList.remove('show');
                    error.textContent = 'Passwords do not match';
                    error.classList.add('show');
                    confirmPassword.classList.add('error');
                }
            }

            // Step Navigation
            canGoToNextStep() {
                const validations = {
                    1: () => this.validateFullName() && this.validateEmail() && this.validatePhone() &&
                            document.getElementById('fullName').value.trim() !== '' &&
                            document.getElementById('email').value.trim() !== '' &&
                            document.getElementById('phone').value.trim() !== '',
                    2: () => this.validateStreet() && this.validateCity() && this.validatePostalCode() && this.validateCountry() &&
                            document.getElementById('street').value.trim() !== '' &&
                            document.getElementById('city').value.trim() !== '' &&
                            document.getElementById('postalCode').value.trim() !== '' &&
                            document.getElementById('country').value !== '',
                    3: () => this.validateUsername() && this.validatePassword() && this.checkPasswordsMatch() &&
                            document.getElementById('username').value.trim() !== '' &&
                            document.getElementById('password').value.trim() !== '' &&
                            document.getElementById('confirmPassword').value.trim() !== ''
                };

                return (validations[this.currentStep] || (() => true))();
            }

            checkPasswordsMatch() {
                const password = document.getElementById('password');
                const confirmPassword = document.getElementById('confirmPassword');
                return password.value === confirmPassword.value && password.value !== '';
            }

            nextStep() {
                if (this.currentStep < this.totalSteps && this.canGoToNextStep()) {
                    this.saveFormData();
                    this.currentStep++;
                    this.updateStepperUI();
                    this.showFormSection();
                }
            }

            previousStep() {
                if (this.currentStep > 1) {
                    this.saveFormData();
                    this.currentStep--;
                    this.updateStepperUI();
                    this.showFormSection();
                }
            }

            goToStep(stepNum) {
                if (stepNum === this.currentStep) return;
                if (stepNum > this.currentStep && !this.canGoToNextStep()) return;
                this.saveFormData();
                this.currentStep = stepNum;
                this.updateStepperUI();
                this.showFormSection();
            }

            // UI Updates
            updateStepperUI() {
                const steps = document.querySelectorAll('.step');
                const stepTitles = {
                    1: 'Step 1: Personal Information',
                    2: 'Step 2: Address Details',
                    3: 'Step 3: Account Setup',
                    4: 'Step 4: Review & Submit'
                };

                steps.forEach((step, index) => {
                    const stepNum = index + 1;
                    step.classList.remove('active', 'completed');

                    if (stepNum === this.currentStep) {
                        step.classList.add('active');
                    } else if (stepNum < this.currentStep) {
                        step.classList.add('completed');
                    }
                });

                document.getElementById('stepperTitle').textContent = stepTitles[this.currentStep];
                this.updateNavigationButtons();

                if (this.currentStep === this.totalSteps) {
                    this.populateReviewSection();
                }
            }

            updateNavigationButtons() {
                const prevBtn = document.getElementById('prevBtn');
                const nextBtn = document.getElementById('nextBtn');
                const submitBtn = document.getElementById('submitBtn');

                prevBtn.classList.toggle('show', this.currentStep > 1);
                
                if (this.currentStep === this.totalSteps) {
                    nextBtn.style.display = 'none';
                    submitBtn.style.display = 'flex';
                } else {
                    nextBtn.style.display = 'flex';
                    submitBtn.style.display = 'none';
                    nextBtn.disabled = !this.canGoToNextStep();
                }
            }

            showFormSection() {
                document.querySelectorAll('.form-section').forEach(section => {
                    section.classList.remove('active');
                });
                document.querySelector(`[data-section="${this.currentStep}"]`).classList.add('active');
                window.scrollTo(0, 0);
            }

            populateReviewSection() {
                const data = this.formData;
                document.querySelector('[data-review="fullName"]').textContent = data.fullName || '-';
                document.querySelector('[data-review="email"]').textContent = data.email || '-';
                document.querySelector('[data-review="phone"]').textContent = data.phone || '-';
                document.querySelector('[data-review="street"]').textContent = data.street || '-';
                document.querySelector('[data-review="city"]').textContent = data.city || '-';
                document.querySelector('[data-review="postalCode"]').textContent = data.postalCode || '-';
                document.querySelector('[data-review="country"]').textContent = data.country || '-';
                document.querySelector('[data-review="username"]').textContent = data.username || '-';
            }

            // Local Storage
            saveFormData() {
                this.formData = {
                    fullName: document.getElementById('fullName').value,
                    email: document.getElementById('email').value,
                    phone: document.getElementById('phone').value,
                    street: document.getElementById('street').value,
                    city: document.getElementById('city').value,
                    postalCode: document.getElementById('postalCode').value,
                    country: document.getElementById('country').value,
                    username: document.getElementById('username').value,
                    password: document.getElementById('password').value,
                    confirmPassword: document.getElementById('confirmPassword').value
                };
                localStorage.setItem('registrationFormData', JSON.stringify(this.formData));
                localStorage.setItem('registrationStep', this.currentStep.toString());
            }

            loadFormData() {
                const saved = localStorage.getItem('registrationFormData');
                return saved ? JSON.parse(saved) : {};
            }

            restoreFormData() {
                const { fullName = '', email = '', phone = '', street = '', city = '', postalCode = '', country = '', username = '', password = '', confirmPassword = '' } = this.formData;

                document.getElementById('fullName').value = fullName;
                document.getElementById('email').value = email;
                document.getElementById('phone').value = phone;
                document.getElementById('street').value = street;
                document.getElementById('city').value = city;
                document.getElementById('postalCode').value = postalCode;
                document.getElementById('country').value = country;
                document.getElementById('username').value = username;
                document.getElementById('password').value = password;
                document.getElementById('confirmPassword').value = confirmPassword;
            }

            // API Calls
            async loadCountries() {
                try {
                    // Using REST Countries API
                    const response = await fetch('https://restcountries.com/v3.1/all');
                    const data = await response.json();
                    this.countries = data.map(country => country.name.common).sort();
                    this.populateCountryDropdown();
                } catch (error) {
                    console.log('Using mock countries list');
                    this.countries = ['United States', 'Canada', 'United Kingdom', 'Australia', 'Germany', 'France', 'India', 'Japan', 'Brazil', 'Mexico'];
                    this.populateCountryDropdown();
                }
            }

            populateCountryDropdown() {
                const countrySelect = document.getElementById('country');
                this.countries.forEach(country => {
                    const option = document.createElement('option');
                    option.value = country;
                    option.textContent = country;
                    countrySelect.appendChild(option);
                });
            }

            async submitForm() {
                if (!this.canGoToNextStep() && this.currentStep !== this.totalSteps) return;

                this.saveFormData();
                
                // Simulate API call
                try {
                    const submitBtn = document.getElementById('submitBtn');
                    submitBtn.disabled = true;
                    submitBtn.textContent = 'Submitting...';

                    await new Promise(resolve => setTimeout(resolve, 1500));

                    // Mock successful submission
                    console.log('Form Data Submitted:', this.formData);
                    this.showSuccessModal();
                    this.clearFormData();
                } catch (error) {
                    console.error('Submission error:', error);
                    alert('Error submitting form. Please try again.');
                } finally {
                    const submitBtn = document.getElementById('submitBtn');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Submit';
                }
            }

            clearFormData() {
                localStorage.removeItem('registrationFormData');
                localStorage.removeItem('registrationStep');
            }

            showSuccessModal() {
                document.getElementById('successModal').classList.add('show');
            }
        }

        // Global Functions
        function nextStep() {
            formManager.nextStep();
        }

        function previousStep() {
            formManager.previousStep();
        }

        function goToStep(stepNum) {
            formManager.goToStep(stepNum);
        }

        function restartForm() {
            document.getElementById('successModal').classList.remove('show');
            document.getElementById('registrationForm').reset();
            formManager.clearFormData();
            formManager.currentStep = 1;
            formManager.updateStepperUI();
            formManager.showFormSection();
            formManager.restoreFormData();
        }

        // Initialize
        let formManager;
        document.addEventListener('DOMContentLoaded', () => {
            formManager = new FormManager();
        });
    </script>
</body>
</html>
